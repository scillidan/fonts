name: Check Updates

on:
  schedule:
    - cron: '0 0 * * 1'
  workflow_dispatch:

permissions:
  issues: write

jobs:
  check:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v6

      - name: Check for updates
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          shopt -s globstar
          for manifest_file in fonts/**/*.json; do
            if [[ "$manifest_file" == *.meta.json ]]; then
              continue
            fi

            local_version=$(jq -r '.version' "$manifest_file")
            name=$(basename "$manifest_file" .json)
            font_dir=$(basename "$(dirname "$manifest_file")")

            checkver=$(jq -r '.checkver' "$manifest_file")
            autoupdate=$(jq -r '.autoupdate' "$manifest_file")
            if [[ "$checkver" == "null" && "$autoupdate" == "null" ]]; then
              echo "No checkver/autoupdate for $name, skipping"
              continue
            fi

            echo "Checking $name (local: $local_version)..."

            remote_version=""

            if [[ "$checkver" == "github" ]]; then
              homepage=$(jq -r '.homepage' "$manifest_file")
              repo_path=$(echo "$homepage" | sed 's|https://github.com/||')
              if [[ -z "$repo_path" ]]; then
                echo "::warning::Could not extract GitHub repo from homepage for $name"
                continue
              fi
              tag=$(gh api "repos/$repo_path/releases/latest" --jq '.tag_name' 2>/dev/null || true)
              if [[ -z "$tag" ]]; then
                echo "::warning::No releases found for $name"
                continue
              fi
              remote_version=$(echo "$tag" | sed 's|^v||')

            elif [[ "$checkver" != "null" ]]; then
              checkver_url=$(jq -r '.checkver.url' "$manifest_file")
              checkver_jsonpath=$(jq -r '.checkver.jsonpath // empty' "$manifest_file")
              checkver_regex=$(jq -r '.checkver.regex // empty' "$manifest_file")
              checkver_replace=$(jq -r '.checkver.replace // empty' "$manifest_file")

              if [[ -z "$checkver_url" ]]; then
                echo "::warning::Custom checkver has no url for $name"
                continue
              fi

              response=$(curl -sL "$checkver_url")

              if [[ -n "$checkver_jsonpath" ]]; then
                extracted=$(echo "$response" | jq -r "$checkver_jsonpath" 2>/dev/null || true)
              else
                extracted=$(echo "$response")
              fi

              if [[ -n "$checkver_regex" && "$extracted" != "null" && -n "$extracted" ]]; then
                match=$(echo "$extracted" | grep -oP "$checkver_regex" | head -1 || true)
                if [[ -n "$checkver_replace" && -n "$match" ]]; then
                  remote_version=$(echo "$match" | perl -pe "$checkver_replace" || true)
                elif [[ -n "$match" ]]; then
                  remote_version="$match"
                fi
              elif [[ "$extracted" != "null" && -n "$extracted" ]]; then
                remote_version="$extracted"
              fi
            fi

            if [[ -z "$remote_version" ]]; then
              echo "::warning::Could not determine remote version for $name"
              continue
            fi

            echo "Remote version: $remote_version"

            if [[ "$remote_version" != "$local_version" ]]; then
              title="[Features] $font_dir : update version to $remote_version"
              echo "Update available: $title"

              existing=$(gh issue list --search "$title" --json number --jq 'length')
              if [[ "$existing" == "0" ]]; then
                gh issue create --title "$title" --body "New version $remote_version available for $font_dir (current: $local_version)."
              else
                echo "Issue already exists, skipping"
              fi
            fi
          done
